services:
  repogen-db:
    image: postgres:18-alpine
    profiles: ["repogen-slice"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${REPOGEN_POSTGRES_DB:-zenops}
      POSTGRES_USER: ${REPOGEN_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${REPOGEN_POSTGRES_PASSWORD:-postgres}
    volumes:
      - repogen_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REPOGEN_POSTGRES_USER:-postgres} -d ${REPOGEN_POSTGRES_DB:-zenops}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - repogen-internal

  repogen-redis:
    image: redis:7-alpine
    profiles: ["repogen-slice"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - repogen_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - repogen-internal

  repogen-bootstrap:
    image: node:20-alpine
    profiles: ["repogen-slice"]
    restart: "no"
    working_dir: /workspace
    depends_on:
      repogen-db:
        condition: service_healthy
      repogen-redis:
        condition: service_healthy
    environment: &repogen-env
      NODE_ENV: ${REPOGEN_NODE_ENV:-production}
      LOG_LEVEL: ${REPOGEN_LOG_LEVEL:-info}
      CI: "true"
      API_PORT: "3000"
      WORKER_CONCURRENCY: ${REPOGEN_WORKER_CONCURRENCY:-4}
      ZENOPS_MULTI_TENANT_ENABLED: ${REPOGEN_MULTI_TENANT_ENABLED:-false}
      ZENOPS_INTERNAL_TENANT_ID: ${REPOGEN_INTERNAL_TENANT_ID:-11111111-1111-1111-1111-111111111111}
      ZENOPS_EXTERNAL_TENANT_ID: ${REPOGEN_EXTERNAL_TENANT_ID:-22222222-2222-2222-2222-222222222222}
      JWT_SECRET: ${REPOGEN_JWT_SECRET:-change_me_repogen}
      DATABASE_URL_ROOT: ${REPOGEN_DATABASE_URL_ROOT:-postgresql://postgres:postgres@repogen-db:5432/zenops}
      DATABASE_URL_API: ${REPOGEN_DATABASE_URL_API:-postgresql://zen_api:zen_api@repogen-db:5432/zenops}
      DATABASE_URL_WORKER: ${REPOGEN_DATABASE_URL_WORKER:-postgresql://zen_worker:zen_worker@repogen-db:5432/zenops}
      REDIS_URL: ${REPOGEN_REDIS_URL:-redis://repogen-redis:6379}
      ARTIFACTS_DIR: /var/zenops/artifacts
      STORAGE_DRIVER: ${REPOGEN_STORAGE_DRIVER:-local}
      S3_ENDPOINT: ${REPOGEN_S3_ENDPOINT:-}
      S3_REGION: ${REPOGEN_S3_REGION:-auto}
      S3_BUCKET: ${REPOGEN_S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${REPOGEN_S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${REPOGEN_S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${REPOGEN_S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_BASE_URL: ${REPOGEN_S3_PUBLIC_BASE_URL:-}
    command: >-
      sh -lc "if [ -f /var/zenops/bootstrap/.done ]; then echo 'bootstrap already completed'; exit 0; fi
      && corepack enable
      && pnpm install --frozen-lockfile
      && pnpm --filter @zenops/db run prisma:generate
      && pnpm --filter @zenops/auth build
      && pnpm --filter @zenops/common build
      && pnpm --filter @zenops/config build
      && pnpm --filter @zenops/contracts build
      && pnpm --filter @zenops/rls build
      && pnpm --filter @zenops/storage build
      && node -e \"const fs=require('fs');const ts=require('typescript');const src=fs.readFileSync('packages/db/src/index.ts','utf8');const out=ts.transpileModule(src,{compilerOptions:{module:'ESNext',target:'ES2022'}}).outputText;fs.mkdirSync('packages/db/dist',{recursive:true});fs.writeFileSync('packages/db/dist/index.js',out);\"
      && node scripts/bootstrap-db.mjs
      && mkdir -p /var/zenops/bootstrap
      && touch /var/zenops/bootstrap/.done"
    volumes:
      - ../..:/workspace
      - repogen_node_modules:/workspace/node_modules
      - repogen_artifacts:/var/zenops/artifacts
      - repogen_bootstrap_state:/var/zenops/bootstrap
    networks:
      - repogen-internal

  repogen-api:
    image: node:20-alpine
    profiles: ["repogen-slice"]
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      repogen-bootstrap:
        condition: service_completed_successfully
    environment:
      <<: *repogen-env
    command: >-
      sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @zenops/api dev"
    volumes:
      - ../..:/workspace
      - repogen_node_modules:/workspace/node_modules
      - repogen_artifacts:/var/zenops/artifacts
    ports:
      - "${REPOGEN_API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/v1/health >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - repogen-internal
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-proxy}"
      - "traefik.http.routers.repogen-api.rule=Host(`${REPOGEN_DOMAIN:-repogen.local}`) && (PathPrefix(`/v1`) || PathPrefix(`/docs`))"
      - "traefik.http.routers.repogen-api.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.repogen-api.tls=true"
      - "traefik.http.routers.repogen-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.repogen-api.priority=120"
      - "traefik.http.services.repogen-api.loadbalancer.server.port=3000"

  repogen-worker:
    image: node:20-alpine
    profiles: ["repogen-slice"]
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      repogen-api:
        condition: service_healthy
      repogen-redis:
        condition: service_healthy
    environment:
      <<: *repogen-env
    command: >-
      sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @zenops/worker dev"
    volumes:
      - ../..:/workspace
      - repogen_node_modules:/workspace/node_modules
      - repogen_artifacts:/var/zenops/artifacts
    networks:
      - repogen-internal

  repogen-web:
    image: node:20-alpine
    profiles: ["repogen-slice"]
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      repogen-api:
        condition: service_healthy
    environment:
      CI: "true"
      VITE_API_BASE_URL: ${REPOGEN_PUBLIC_API_BASE_URL:-http://localhost:3000/v1}
      PORT: "5174"
    command: >-
      sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @zenops/web dev --host 0.0.0.0 --port 5174"
    volumes:
      - ../..:/workspace
      - repogen_node_modules:/workspace/node_modules
    ports:
      - "${REPOGEN_WEB_PORT:-5174}:5174"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5174 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    networks:
      - repogen-internal
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-proxy}"
      - "traefik.http.routers.repogen-web.rule=Host(`${REPOGEN_DOMAIN:-repogen.local}`)"
      - "traefik.http.routers.repogen-web.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.repogen-web.tls=true"
      - "traefik.http.routers.repogen-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.repogen-web.priority=20"
      - "traefik.http.services.repogen-web.loadbalancer.server.port=5174"

volumes:
  repogen_db_data:
  repogen_redis_data:
  repogen_artifacts:
  repogen_node_modules:
  repogen_bootstrap_state:

networks:
  repogen-internal:
    driver: bridge
  traefik-proxy:
    name: ${TRAEFIK_NETWORK:-traefik-proxy}
    external: ${TRAEFIK_NETWORK_EXTERNAL:-false}
